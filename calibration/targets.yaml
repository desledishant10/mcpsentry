# Calibration corpus — targets for hand-labeling and evaluation.
#
# Status values:
#   queued     Not yet labeled.
#   labeled    Ground truth file exists in ground_truth/.
#   evaluated  Eval results captured in reports/.
#
# Updating a target's status is manual — the eval script does not modify
# this file. When all status==labeled, run the eval against each and
# generate the aggregate.

targets:
  - name: example_server
    source: analyzer/tests/fixtures/example_server.py
    language: python
    status: labeled
    notes: Worked example. The analyzer's own test fixture. Demonstrates the workflow without requiring an external clone.

  - name: mcp-server-time
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/time
    language: python
    status: labeled
    notes: Reference Python server. Small surface (~3 tools). Labels best-effort from public docs; verify before promoting to authoritative.

  - name: mcp-server-fetch
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
    language: python
    status: labeled
    notes: HTTP fetch server. Positive control for net_egress. Labels best-effort from public docs; verify before promoting to authoritative.

  - name: mcp-server-git
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/git
    language: python
    status: labeled
    notes: Git operations server. 12 tools (status/diff/log/show/branch as fs_read, commit/add/reset/checkout/create_branch as fs_write). Labeled from direct capture of installed package.

  - name: mcp-server-sqlite
    source: https://pypi.org/project/mcp-server-sqlite/
    language: python
    status: evaluated
    notes: |
      SQLite MCP server v2025.4.25 from PyPI. 6 tools: read_query,
      write_query, create_table, list_tables, describe_table,
      append_insight. Captured via the `mcp-server-sqlite` console
      script.

      Initial labeling surfaced two classifier gaps (db_write missing
      DDL CREATE verbs; db_query missing SQL introspection verbs); both
      closed in a calibration-driven follow-up. Current state: db_query
      and db_write both at 1.00 precision and 1.00 recall on this
      target, zero regression on any other target in the corpus.

      3 tools also fire MCP-S-008 (positive control for the SQL
      injection class) + 1 MCP-S-005 (server-level db_query+db_write
      overbroad combination — full DB compromise on injection).

  - name: mcp-server-filesystem
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
    language: typescript
    status: queued
    notes: Filesystem server. TypeScript — analyzer cannot process source until v0.2; classifier can still run on a captured tools/list.

  - name: mcp-server-github
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/github
    language: typescript
    status: queued
    notes: GitHub API server. TypeScript. Large surface, mix of read/write/exec-via-workflow.

  - name: mcp-server-postgres
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/postgres
    language: typescript
    status: queued
    notes: Postgres query server. TypeScript.

  - name: mcp-server-slack
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/slack
    language: typescript
    status: queued
    notes: Slack API server. TypeScript. Tests messaging exfil patterns.

  - name: mcp-server-memory
    source: https://github.com/modelcontextprotocol/servers/tree/main/src/memory
    language: typescript
    status: labeled
    notes: In-memory knowledge graph. TypeScript. Low-capability-surface negative control. Labels best-effort from public docs; verify before promoting to authoritative.

  - name: mcp-server-shell
    source: https://pypi.org/project/mcp-server-shell/
    language: python
    status: labeled
    notes: Single-tool exec server (`execute_command`). Verified by direct capture. Classifier high-confidence exec; no S-* findings on the description itself.

  - name: mcp-server-file-finder
    source: https://pypi.org/project/mcp-server-file-finder/
    language: python
    status: labeled
    notes: macOS-only file search via Spotlight (`mdfind`). Single tool literally named `search`. Drove the noun-before-verb fs_read lexicon update.

  - name: mcp-server-http-request
    source: https://pypi.org/project/mcp-server-http-request/
    language: python
    status: labeled
    notes: Generic HTTP client (GET/POST/PUT/PATCH/DELETE — 5 tools). Same env-dependent SSRF surface as mcp-server-fetch. Tool descriptions use 'Use this to ...' style — deliberately not flagged by S-001 (too common in benign API docs).

  - name: mcp-server-anki
    source: https://pypi.org/project/mcp-server-anki/
    language: python
    status: labeled
    notes: Anki integration (8 tools). Verified by direct capture. Drove the negative-lookbehind fix on the `lists?` pattern (Python type annotations like `Optional[List[str]] - Tags` were causing FP).

  - name: mcp-server-aidd
    source: https://pypi.org/project/mcp-server-aidd/
    language: python
    status: labeled
    notes: Coding-assistant MCP (33 tools). Verified by direct capture. Largest single target in corpus. First server to trip multiple analyzer rules in one pass (S-001 + S-002 + S-005). See findings/2026-05-11-aidd-three-rule-multi-hit.md.
