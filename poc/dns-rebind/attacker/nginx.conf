worker_processes 1;
events { worker_connections 64; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Resolver: use Docker's embedded DNS so we can refer to other compose
    # services by name (`victim`, etc).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Map upstream by variable so nginx doesn't try to resolve at config-
    # parse time. Necessary when the upstream container is on the same
    # docker compose network and may start after nginx.
    map "" $victim_upstream {
        default victim:3000;
    }

    server {
        listen 3000;
        server_name _;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Static files for the attacker page itself (index.html + rebind.js).
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # The attacker page POSTs to /mcp from the browser. nginx proxies
        # that to the victim's MCP server, preserving the browser-set
        # Origin and Host headers — which is exactly what would happen
        # post-DNS-rebind, just without needing the browser to actually
        # re-resolve.
        #
        # The vulnerability under test is "the victim accepts the
        # browser-set Origin: http://evil.example:3000 header". This proxy
        # configuration delivers that header to the victim unchanged.
        location = /mcp {
            proxy_pass http://$victim_upstream/mcp;
            proxy_set_header Host $http_host;        # browser sent: evil.example:3000
            proxy_set_header Origin $http_origin;     # browser sent: http://evil.example:3000
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_buffering off;                      # let SSE responses stream

            # If the victim is slow to come up, fail fast (the playwright
            # test will retry).
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
